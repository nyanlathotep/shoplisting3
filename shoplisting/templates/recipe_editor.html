{% extends 'admin/master.html' %}
{% block body %}

<div x-data="recipeEditor()" x-init="init()" class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 x-text="recipe.id ? 'Edit Recipe' : 'Create Recipe'"></h2>
        <button class="btn btn-success" @click="save()">Save Recipe</button>
    </div>

    <!-- Basic Info -->
    <div class="card mb-4">
        <div class="card-header"><strong>Basic Info</strong></div>
        <div class="card-body">

            <label class="form-label">Recipe Name</label>
            <input class="form-control mb-1" x-model="recipe.name">

            <label class="form-label">Remark (database only)</label>
            <input class="form-control mb-1" x-model="recipe.remark">

            <label class="form-label">Shopping List Note</label>
            <input class="form-control mb-1" x-model="recipe.note">

            <p><strong>Card Fields</strong></p>

            <label class="form-label">Top Note (Time)</label>
            <input class="form-control mb-1" x-model="recipe.top_note">

            <label class="form-label">Bottom Note (Recipe Source)</label>
            <input class="form-control mb-1" x-model="recipe.bot_note">

            <p><strong>Recipe Printout Fields</strong></p>

            <label class="form-label">Header Left</label>
            <input class="form-control mb-1" x-model="recipe.head_left">

            <label class="form-label">Header Middle</label>
            <input class="form-control mb-1" x-model="recipe.head_mid">

            <label class="form-label">Header Right</label>
            <input class="form-control mb-1" x-model="recipe.head_right">

            <label class="form-label">Header Description</label>
            <input class="form-control mb-1" x-model="recipe.head_desc">

        </div>
    </div>

    <!-- Tags -->
    <div class="card mb-4">
        <div class="card-header"><strong>Card Tags</strong></div>
        <div class="card-body">

            <template x-for="group in groupedTags" :key="group.label">
                <div class="mb-3">
                    <strong class="mb-2" x-text="group.label"></strong>
                    <div class="px-2">
                        <div class="row">
                            <template x-for="tag in group.tags" :key="tag.id">
                                <div class="col-6 col-md-4 mb-1">
                                    <label class="form-check-label d-flex align-items-center">
                                        <input type="checkbox"
                                            class="form-check-input me-2"
                                            :value="tag.id"
                                            @change="toggleTag(tag.id)"
                                            :checked="recipe.tags.includes(tag.id)">
                                        <span x-text="tag.name"></span>
                                    </label>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </template>

        </div>
    </div>


    <!-- Steps -->
    <div class="card mb-4">
        <div class="card-header d-flex justify-content-between align-items-center">
            <strong>Steps</strong>
        </div>

        <div class="card-body">
            <template x-for="(step, sIndex) in recipe.steps" :key="sIndex">
                <div class="border rounded p-3 mb-4">

                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h5 class="mb-0">Step <span x-text="sIndex + 1"></span></h5>
                    </div>

                    <label class="form-label">Instruction</label>
                    <input class="form-control mb-3" x-model="step.instruction">

                    <!-- Items -->
                    <h6>Items</h6>

                    <template x-for="(item, iIndex) in step.items" :key="iIndex">
                        <div class="row g-2 mb-2 position-relative">

                            <!-- Amount -->
                            <div class="col-3">
                                <input class="form-control" placeholder="Amount"
                                       x-model="item.amount">
                            </div>

                            <!-- Unit -->
                            <div class="col-3">
                                <input class="form-control" placeholder="Unit"
                                       x-model="item.unit">
                            </div>

                            <!-- Ingredient -->
                            <div class="col-4 position-relative">

                                <input class="form-control"
                                       placeholder="Ingredient"
                                       x-model="item.ingredient"
                                       @input.debounce.300ms="searchIngredient(item)"
                                       @keydown.down.prevent="moveHighlight(item, 1)"
                                       @keydown.up.prevent="moveHighlight(item, -1)"
                                       @keydown.enter.prevent="chooseHighlighted(item)"
                                       @keydown.escape="item.suggestions = []"
                                       @blur="closeSuggestions(item)"
                                       :class="{'border-warning': isNewIngredient(item)}">

                                <!-- Suggestions -->
                                <div class="suggestions shadow"
                                     x-show="item.suggestions && item.suggestions.length"
                                     style="position:absolute; background:white; z-index:10; width:100%;">
                                    <template x-for="(s, idx) in item.suggestions" :key="idx">
                                        <div class="px-2 py-1"
                                             :class="{'bg-primary text-white': idx === item.highlightIndex}"
                                             @mousedown.prevent="selectSuggestion(item, s)"
                                             x-text="s"
                                             style="cursor:pointer;">
                                        </div>
                                    </template>
                                </div>

                                <!-- New ingredient indicator -->
                                <div x-show="isNewIngredient(item)" class="text-warning small mt-1">
                                    New ingredient will be created
                                </div>

                            </div>

                            <!-- Remove -->
                            <div class="col-2 d-flex align-items-center">
                                <button class="btn btn-outline-danger btn-sm"
                                        @click="step.items.splice(iIndex,1)">
                                    X
                                </button>
                            </div>

                        </div>
                    </template>
                    <div class="border-top pt-1 mt-1 mr-1">
                        <button class="btn btn-success btn-sm"
                                @click="step.items.push({amount:'', unit:'', ingredient:'', suggestions:[], highlightIndex:-1, isExisting:false})">
                            <span class="fa fa-plus"></span> Item
                        </button>
                        <button class="btn btn-secondary btn-sm"
                                @click="move_step(sIndex,0)"
                                :disabled="sIndex == 0"
                                :class="{'disabled': sIndex == 0}">
                            <span class="fa fa-angle-double-up"></span>
                        </button>
                        <button class="btn btn-secondary btn-sm"
                                @click="move_step(sIndex,sIndex-1)"
                                :disabled="sIndex == 0"
                                :class="{'disabled': sIndex == 0}">
                            <span class="fa fa-angle-up"></span>
                        </button>
                        <button class="btn btn-secondary btn-sm"
                                @click="move_step(sIndex,sIndex+1)"
                                :disabled="sIndex == recipe.steps.length - 1"
                                :class="{'disabled': sIndex == recipe.steps.length - 1}">
                            <span class="fa fa-angle-down"></span>
                        </button>
                        <button class="btn btn-secondary btn-sm"
                                @click="move_step(sIndex,recipe.steps.length-1)"
                                :disabled="sIndex == recipe.steps.length - 1"
                                :class="{'disabled': sIndex == recipe.steps.length - 1}">
                            <span class="fa fa-angle-double-down"></span>
                        </button>
                        <button class="btn btn-primary btn-sm"
                                @click="recipe.steps.splice(sIndex + 1, 0, {id: new_id(), instruction:'', items:[]})">
                            <span class="fa fa-plus"></span> Step
                        </button>
                        <button class="btn btn-danger btn-sm"
                                @click="remove_step(sIndex)">
                            <span class="fa fa-ban"></span> Remove Step
                        </button>
                    </div>
                </div>
            </template>
        </div>
    </div>

    {% include 'delete_modal.html' %}

    <div class="btn-group mb-3" role="group">
        <button class="btn btn-outline-primary preview-mode-btn active" data-tab="#preview-print">Print Preview</button>
        <button class="btn btn-outline-primary preview-mode-btn" data-tab="#preview-svg">SVG Preview</button>
        <button class="btn btn-outline-primary preview-mode-btn" data-tab="#preview-json">Debug JSON</button>
    </div>

    <div id="preview-print" class="card mt-4 preview-panel">
        <div class="card-header"><strong>Print Preview</strong></div>
        <div class="card-body">
            <div 
                x-data="previewLoader({
                    url: '/api/recipe/print',
                    watch: () => recipe,
                    loader_type: 'html'})"
                x-init="init()">
                <div x-ref="container" x-html="content"></div>
        </div>
    </div>
    </div>

    <div id="preview-svg" class="card mt-4 preview-panel">
        <div class="card-header"><strong>SVG Preview</strong></div>
        <div class="card-body">
            <div 
                x-data="previewLoader({
                    url: '/api/card/draw_preview',
                    watch: () => recipe,
                    loader_type: 'svg-vp',
                    on_load: svg => {
                        // Modify viewport here
                        svg.setAttribute('viewBox', '24 24 192 336');
                        svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
                    }})"
                x-init="init()">
                <div x-ref="container" x-html="content"></div>
                <!-- <img x-ref="container" :src="content" alt="Preview" /> -->
            </div>
        </div>
    </div>

    <div id="preview-json" class="card mt-4 preview-panel">
        <div class="card-header"><strong>Debug JSON</strong></div>
        <div class="card-body">
            <pre x-text="JSON.stringify(recipe, null, 2)"></pre>
        </div>
    </div>

{% block tail %}
<style>
    svg {
        max-height: 400px;
    }
    .preview-panel {
        min-height: 400px;
    }
</style>
<script src={{ url_for('static', filename='alpine.min.js') }} defer></script>
<script src={{ url_for('static', filename='common.js') }} defer></script>
<script>
var last_id = 0
function new_id() {
    last_id++; return last_id;
}
function recipeEditor() {
    return {
        recipe: {
            id: null,
            name: "",
            top_note: "",
            bot_note: "",
            remark: "",
            tags: [],
            steps: [{id: new_id(), instruction:'', items:[]}]
        },

        allTags: [],

        async init() {
            // Load tags
            let tagRes = await fetch("/api/tag/list");
            this.allTags = await tagRes.json();

            // Load recipe if editing
            const params = new URLSearchParams(window.location.search);
            if (params.has("id")) {
                let id = params.get("id");
                let res = await fetch(`/api/recipe/get?id=${id}`);
                this.recipe = await res.json();
                if (this.recipe.steps.length == 0) {
                    this.recipe.steps = [{id: new_id(), instruction:'', items:[]}];
                }
                // Normalize loaded items so they behave like existing ones
                for (let step of this.recipe.steps) {
                    step.id = new_id();
                    for (let item of step.items) {
                        item.suggestions = [];
                        item.highlightIndex = -1;
                        item.isExisting = true;
                    }
                }
            }
            mount_switcher('.preview-mode-btn', '.preview-panel', '#preview-print');
        },

        move_step(from, to) {
            const [moved] = this.recipe.steps.splice(from, 1);
            this.recipe.steps.splice(to, 0, moved);
        },

        remove_step(index, force) {
            if (this.recipe.steps[index].items.length == 0 || force == true) {
                this.recipe.steps.splice(index,1);
                if (this.recipe.steps.length == 0) {
                    this.recipe.steps = [{id: new_id(), instruction:'', items:[]}];
                }
                return;
            }
            confirm_modal({
                modalId: '#confirmModal',
                title: 'Delete Step?',
                body: `Are you sure you want to delete this step? It has ${this.recipe.steps[index].items.length} items in it, which will be deleted.`,
                onConfirm: () => {
                    this.remove_step(index, true);
                }
            })
        },

        async searchIngredient(item) {
            if (!item.ingredient) {
                item.suggestions = [];
                item.highlightIndex = -1;
                item.isExisting = false;
                return;
            }
            let res = await fetch(`/api/ingredient/search?q=${encodeURIComponent(item.ingredient)}`);
            item.suggestions = await res.json();
            item.highlightIndex = -1;

            // Persistent existence flag
            item.isExisting = item.suggestions.includes(item.ingredient);
        },

        moveHighlight(item, direction) {
            if (!item.suggestions || !item.suggestions.length) return;

            let max = item.suggestions.length - 1;

            item.highlightIndex += direction;

            if (item.highlightIndex < 0) item.highlightIndex = max;
            if (item.highlightIndex > max) item.highlightIndex = 0;
        },

        chooseHighlighted(item) {
            if (item.highlightIndex >= 0 &&
                item.highlightIndex < item.suggestions.length) {

                let choice = item.suggestions[item.highlightIndex];
                this.selectSuggestion(item, choice);
            }
        },

        get groupedTags() {
            const groups = {
                TOP_LEFT:   { label: "Prep (◤)",          tags: [] },
                TOP_RIGHT:  { label: "Supply (◥)",        tags: [] },
                BOT_LEFT:   { label: "Meal Type (◣)",     tags: [] },
                BOT_RIGHT:  { label: "Protein Source (◢)", tags: [] }
            };

            for (let tag of this.allTags) {
                if (groups[tag.position]) {
                    groups[tag.position].tags.push(tag);
                }
            }

            return Object.values(groups);
        },

        selectSuggestion(item, name) {
            item.ingredient = name;
            item.suggestions = [];
            item.highlightIndex = -1;
            item.isExisting = true;
        },

        closeSuggestions(item) {
            setTimeout(() => {
                item.suggestions = [];
                item.highlightIndex = -1;
            }, 150);
        },

        isNewIngredient(item) {
            return item.ingredient && !item.isExisting;
        },

        toggleTag(tagId) {
            let idx = this.recipe.tags.indexOf(tagId);
            if (idx === -1) {
                this.recipe.tags.push(tagId);
            } else {
                this.recipe.tags.splice(idx, 1);
            }
        },

        async save() {
            let res = await fetch("/api/recipe/save", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(this.recipe)
            });

            let out = await res.text();
            if (res.ok) {
                out = JSON.parse(out);
                if (out.redirect) {
                    window.location = out.redirect;
                }
            } else {
                alert("Save failed")
            }
        },

        previewLoader({ url, watch, loader_type, on_load }) {
            return {
                content: '',
                visible: false,
                observer: null,
                lastValue: null,

                async fetchContent() {
                    if (!this.visible) return;

                    const current = watch();
                    const serialized = JSON.stringify(current);

                    if (serialized === this.lastValue) return;
                    this.lastValue = serialized;

                    const res = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(current)
                    });

                    if (loader_type == 'html') {
                        this.content = await res.text();
                    } else if (loader_type == 'svg-image') {
                        // Blob → object URL → <img src="">
                        const svgText = await res.text();
                        const blob = new Blob([svgText], { type: 'image/svg+xml' });
                        this.content = URL.createObjectURL(blob);
                    } else if (loader_type == 'svg-vp') {
                        this.content = await res.text();
                        this.$nextTick(() => {
                            const svgEl = this.$refs.container.querySelector('svg');
                            if (svgEl && on_load) on_load(svgEl);
                        });
                    }
                },

                init() {
                    this.observer = new IntersectionObserver(entries => {
                        this.visible = entries[0].isIntersecting;
                        if (this.visible) this.fetchContent();
                    });

                    this.observer.observe(this.$refs.container);

                    this.$watch(watch, () => {
                        this.fetchContent();
                    });
                }
            };
        }
    }
}
</script>
{% endblock %}

{% endblock %}
